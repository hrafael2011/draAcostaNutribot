name: CI

on:
  push:
  pull_request:

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check app
      - name: Pytest (sin E2E con BD)
        run: pytest -q --tb=short --ignore=tests/test_e2e_flow.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, typecheck, build
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
